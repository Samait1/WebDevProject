    <div class="container my-5">
        <div class="card shadow mb-5">

          <div class="card-header bg-danger text-white">
            <h2 class="mb-0">Write a Review</h2>
          </div>


        <div class="card-body">
            <form action="">

                <textarea class="form-control mb-3" rows="6"
                    placeholder="Write your review here..."
                    required></textarea>
                
                <button type="submit" class="btn btn-danger text-white">
                    Submit Review
                </button>
            </form><br>

            <form>
                <p>Leave a rating:</p>
  
                <input type="radio" id="one" name="star" value="one" checked>
                <label for="one">1 Star</label><br>

                <input type="radio" id="two" name="star" value="two">
                <label for="two">2 Stars</label><br>

                <input type="radio" id="three" name="star" value="three">
                <label for="three">3 Stars</label><br>

                <input type="radio" id="four" name="star" value="four">
                <label for="four">4 Stars</label><br>

                <input type="radio" id="five" name="star" value="five">
                <label for="five">5 Stars</label><br>

                <button type="submit" class="btn btn-danger text-white">
                    Submit Rating
                </button>
            </form>
        </div>
    </div>
