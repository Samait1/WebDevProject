<main>

    <!-- Sign Up Form Section -->
    <div class="card shadow mb-5">
        <div class="card-header bg-danger text-white">
            <h2 class="mb-0">Sign Up</h2>
        </div>
        <div class="card-body">
            <form action="" id="signupForm">
                <input type="text" id="signupFullname" class="form-control mb-3"
                    placeholder="Enter your full name" required>

                <input type="email" id="signupEmail" class="form-control mb-3"
                    placeholder="Enter your email" required>

                <input type="tel" id="signupPhone" class="form-control mb-3"
                    placeholder="Enter your phone number" required>

                <input type="password" id="signupPassword" class="form-control mb-3"
                    placeholder="Create a password" required>
                    
                <button type="submit" id="signupButton" class="btn btn-danger text-white">
                    Create Account
                </button>
            </form>
        </div>
    </div>

</main>
